{% extends 'base.html' %}

{% block content %}
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">
                Login
            </h1>

            <form class="site-form" action="{% url 'login' %}" method="post">
                {% csrf_token %}
                {{ form }}

                {% if request.GET.next %}
                    <input type="hidden" name="next" value="{{request.GET.next}}">
                {% endif %}

                <input class="login-btn" type="submit" value="Login">
            </form>
        </div>
    </div>
{% endblock %}
