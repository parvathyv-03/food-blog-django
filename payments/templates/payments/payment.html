{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <h2 class="text-center mb-4">Secure Payment</h2>

    <div class="row g-4">
        <div class="col-md-7">
            <div class="card shadow-sm p-4">
                
                <h4 class="mb-3">
                    Payment method
                </h4>

                <form method="post">

                    {% csrf_token %}

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="method" value="card" id="cardOption" checked>
                        <label class="form-check-label">Credit / Debit Card</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="method" value="cod" id="codOption">
                        <label class="form-check-label">Cash on Delivery</label>
                    </div>

                    <div id="cardDetails">
                             <h5 class="mt-4">Card Details</h5>

                            <input class="form-control mb-3" type="text" placeholder="Card Number">

                            <div class="row">
                                <div class="col">
                                    <input class="form-control" type="text" placeholder="MM/YY">
                                </div>

                                <div class="col">
                                    <input class="form-control" type="text" placeholder="CVV">
                                </div>
                            </div>
                    </div>
                   
                    <button type="submit" id="payButton" class="btn btn-success w-100 mt-4">
                        Pay Now
                    </button>
                </form>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card shadow-sm p-4">
                <h4 class="mb-3">Order Summary</h4>

                    {% for item in cart_items %}

                        <div class="d-flex justify-content-between mb-2">
                            <span>{{ item.article.title }}</span>
                            <span>Rs {{ item.article.amount }} x {{ item.quantity }}</span>
                        </div>
                    {% endfor %}

                <hr>

                <h5 class="d-flex justify-content-between">
                    <span>Total</span>
                    <span>Rs {{ total }}</span>
                </h5>
            </div>
        </div>
    </div>
</div>

<script>

    const cardOption = document.getElementById("cardOption");
    const codOption = document.getElementById("codOption");

    const cardDetails = document.getElementById("cardDetails");
    const payButton = document.getElementById("payButton");

    cardOption.addEventListener("change",function(){
        cardDetails.style.display = "block";
        payButton.textContent = "Pay Now";
    });

    codOption.addEventListener("change",function(){
        cardDetails.style.display = "none";
        payButton.textContent = "Shop Now";
    });
</script>

{% endblock %}
